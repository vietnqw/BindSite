[project]
name = "bindsite"
version = "0.1.0"
description = "Protein binding site prediction reproducing DeepProSite"
readme = "README.md"
authors = [
    { name = "Viet Ngo Quang", email = "vietnq.work@gmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "biopython>=1.82",
    "numpy>=1.24",
    "pandas>=2.0",
    "scikit-learn>=1.3",
    "sentencepiece>=0.1.99",
    "torch>=2.0",
    "tqdm>=4.65",
    "transformers>=4.30",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
